name: web-e2e-nonblocking

on:
  workflow_dispatch:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-e2e:
    name: Playwright E2E (visible, non-blocking)
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Web dependencies
        run: npm --prefix "UniversalSyncService.Web" ci

      - name: Build solution for Playwright host
        run: dotnet build "UniversalSyncService.slnx"

      - name: Build Web assets
        run: npm --prefix "UniversalSyncService.Web" run build

      - name: Run Playwright E2E (non-blocking path)
        run: npm --prefix "UniversalSyncService.Web" run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: UniversalSyncService.Web/playwright-report/
          retention-days: 7
