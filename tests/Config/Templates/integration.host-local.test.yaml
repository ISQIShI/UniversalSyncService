UniversalSyncService:
  Service:
    ServiceName: "IntegrationTestHost"
    HeartbeatIntervalSeconds: 60
  Interface:
    EnableGrpc: true
    EnableHttpApi: true
    EnableWebConsole: true
    ManagementApiKey: "test-key"
  Logging:
    MinimumLevel: "Information"
    EnableConsoleSink: false
    EnableFileSink: false
    Overrides: {}
    File:
      Path: "logs/test-.log"
      RollingInterval: "Day"
      RetainedFileCountLimit: 2
      FileSizeLimitBytes: 1048576
      RollOnFileSizeLimit: true
      OutputTemplate: "{Message:lj}{NewLine}{Exception}"
  Plugins:
    EnablePluginSystem: false
    PluginDirectory: "plugins"
    Descriptors: []
  Sync:
    EnableSyncFramework: true
    SchedulerPollingIntervalSeconds: 60
    MaxConcurrentTasks: 1
    HistoryRetentionVersions: 20
    HistoryStorePath: "data/sync-history.db"
    HostWorkspacePath: "{{HOST_WORKSPACE_PATH}}"
    Nodes:
      - Id: "local-slave"
        Name: "本地从节点"
        NodeType: "Local"
        ConnectionSettings:
          RootPath: "{{SLAVE_ROOT}}"
        CustomOptions: {}
        CreatedAt: "2026-04-09T00:00:00+08:00"
        ModifiedAt: "2026-04-09T00:00:00+08:00"
        IsEnabled: true
    Plans:
      - Id: "{{PLAN_ID}}"
        Name: "{{PLAN_NAME}}"
        Description: "{{PLAN_DESCRIPTION}}"
        MasterNodeId: "host-local"
        SyncItemType: "FileSystem"
        SlaveConfigurations:
          - SlaveNodeId: "local-slave"
            SyncMode: "Bidirectional"
            SourcePath: "."
            TargetPath: "{{TARGET_PATH}}"
            EnableDeletionProtection: true
            ConflictResolutionStrategy: "Manual"
            Filters: []
            Exclusions: []
        Schedule:
          TriggerType: "Manual"
          EnableFileSystemWatcher: false
        IsEnabled: false
        CreatedAt: "2026-04-09T00:00:00+08:00"
        ModifiedAt: "2026-04-09T00:00:00+08:00"
        ExecutionCount: 0
